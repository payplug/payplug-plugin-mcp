name: CI

on:
  push:
    tags:
      - '*'
  pull_request:
    branches:
      - 'feature/**'

jobs:
  # -----------------------------------------------------------------------
  # 1. QUALITY — static analysis & code style on PHP 8.4 source
  # -----------------------------------------------------------------------
  quality:
    name: Quality (PHP 8.4)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-scripts

      - name: PHPStan
        run: composer stan

      - name: PHP-CS-Fixer (dry-run)
        run: composer lint

  # -----------------------------------------------------------------------
  # 2. DOWNGRADE — transpile src/ to PHP 7.2 and generate release/
  # -----------------------------------------------------------------------
  downgrade:
    name: Downgrade to PHP 7.2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-scripts

      - name: Run release (Rector downgrade + generate composer.json)
        run: composer release

      - name: Upload payplug-core/ as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: payplug-core-php72
          path: payplug-core/
          retention-days: 7

  # -----------------------------------------------------------------------
  # 3. VALIDATE — install the downgraded package under PHP 7.2
  # -----------------------------------------------------------------------
  validate:
    name: Validate on PHP 7.2
    runs-on: ubuntu-latest
    needs: downgrade
    if: github.event_name == 'pull_request'

    steps:
      - name: Download payplug-core/
        uses: actions/download-artifact@v4
        with:
          name: payplug-core-php72
          path: payplug-core/

      - name: Set up PHP 7.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.2'
          tools: composer:v2
          coverage: none

      - name: Install production dependencies
        working-directory: payplug-core
        run: composer install --no-interaction --prefer-dist --no-dev

  # -----------------------------------------------------------------------
  # 4. TEST — run unit tests against the downgraded PHP 7.2 code
  # -----------------------------------------------------------------------
  test-php72:
    name: Unit Tests on PHP 7.2
    runs-on: ubuntu-latest
    needs: downgrade
    if: github.event_name == 'pull_request'

    steps:
      - name: Download payplug-core/
        uses: actions/download-artifact@v4
        with:
          name: payplug-core-php72
          path: payplug-core/

      - name: Set up PHP 7.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.2'
          tools: composer:v2
          coverage: none

      - name: Inject phpunit ^8 and test autoload into payplug-core/composer.json
        working-directory: payplug-core
        run: |
          php -r '
            $c = json_decode(file_get_contents("composer.json"), true);
            $c["require-dev"] = ["phpunit/phpunit" => "^8.5"];
            $c["autoload-dev"] = ["psr-4" => ["PayplugPluginCore\\tests\\" => "tests/"]];
            file_put_contents("composer.json", json_encode($c, JSON_PRETTY_PRINT|JSON_UNESCAPED_SLASHES)."\n");
          '

      - name: Install dependencies
        working-directory: payplug-core
        run: composer install --no-interaction --prefer-dist

      - name: Run unit tests
        working-directory: payplug-core
        run: vendor/bin/phpunit tests/

  # -----------------------------------------------------------------------
  # 5. PACKAGE — zip and publish the artifact
  # -----------------------------------------------------------------------
  package:
    name: Package artifact
    runs-on: ubuntu-latest
    needs: downgrade
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout (for version)
        uses: actions/checkout@v4

      - name: Download payplug-core/
        uses: actions/download-artifact@v4
        with:
          name: payplug-core-php72
          path: payplug-core/

      - name: Create ZIP
        run: |
          ZIP_NAME="payplug-plugin-core-php72-${GITHUB_REF_NAME}.zip"
          zip -r "$ZIP_NAME" payplug-core/
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: ${{ env.ZIP_NAME }}
          retention-days: 30
